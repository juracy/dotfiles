$screenshot = dms screenshot region --stdout | satty -f - --early-exit --save-after-copy --copy-command=wl-copy --action-on-enter save-to-clipboard -o "$HOME/Pictures/Screenshots/$(date +'screenshot_%Y-%m-%d_%H-%M-%S').png"

unbind = Super, L
unbind = Super, R
unbind = Super, Slash
unbind = , Print
unbind = Shift, Print
