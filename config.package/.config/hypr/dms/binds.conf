bind = Ctrl, Escape, exec, dms ipc call processlist toggle # Task Manager: Toggle
bind = Shift, Print, exec, sh -c "dms screenshot" # Screenshot: Region without edit
bind = Super, L, exec, dms ipc call lock lock # Lock Screen
bind = Super, R, exec, dms ipc call spotlight toggle # App Launcher: Toggle
bind = Super, Slash, exec, dms ipc call keybinds open hyprland # Keybinds Cheatsheet: Open
bind = , Print, exec, sh -c "$screenshot" # Screenshot: Region
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause # Media: Play/Pause
bindr = Super, SUPER_L, exec, dms ipc hypr toggleOverview # Workspace: Overview
