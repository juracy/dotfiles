# Font Configuration
font_family      Iosevka Term
font_size 18.0

symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E5FF,U+E600-U+E631,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+FD46 Symbols Nerd Font

# Window Configuration
window_padding_width 8
confirm_os_window_close 0
sync_to_monitor no

modify_font cell_height 110%
copy_on_select yes
background_opacity 1.0
background_blur 32
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1

# Scrollback
scrollback_lines 10000

# Terminal features
strip_trailing_spaces smart

enable_audio_bell no

allow_remote_control socket-only
listen_on unix:/tmp/kitty

notify_on_cmd_finish invisible 10

# Key bindings for common actions
map ctrl+shift+n new_os_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map kitty_mod+equal  change_font_size all +4.0
map kitty_mod+plus   change_font_size all +4.0
map kitty_mod+kp_add change_font_size all +4.0
map cmd+plus         change_font_size all +4.0
map cmd+equal        change_font_size all +4.0
map shift+cmd+equal  change_font_size all +4.0
map kitty_mod+minus       change_font_size all -4.0
map kitty_mod+kp_subtract change_font_size all -4.0
map cmd+minus             change_font_size all -4.0
map shift+cmd+minus       change_font_size all -4.0
map ctrl+0 change_font_size all 0
map kitty_mod+u    kitten unicode_input --emoji-variation graphic

# Tab configuration
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled

# Dank color generation
include dank-tabs.conf
include dank-theme.conf

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten '~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
